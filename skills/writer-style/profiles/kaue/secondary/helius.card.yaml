voice: helius
role: secondary
register: technical-reference
persona_ref: helius.md
exemplars_ref: ../exemplars/helius/

# Dials mapped straight from evidence/helius.profile.json (card_suggestions). This is a SECONDARY craft
# layer: the dials describe the structure-and-evidence MOVES, applied in the host voice (Kaue) — not a
# surface impersonation of Helius. definition_density is set by judgment from the persona.
dials:
  sentence_length: { median: 16, short_punch_floor: 3, long_reach: 29, burstiness_min: 8 }
    # WRITER: typical sentence ~16 words; still spread — ≥1 short punch (≤3w) and ≥1 long run (≥29w) per
    # section. Reference prose runs tighter than Kaue's. VALIDATOR: generated stdev must clear 8 (≥250w).
  readability_grade: { min: 10, max: 14 }      # technical-reference band; precise terms, glossed inline.
  lexical_density: high                         # dense with content words — it's a reference, not a chat.
  hedge_boost_lean: 0                            # commit on mechanism + measured data; hedge only predictions.
  person_perspective: { first: 28, second: 15, third: 56 }   # mostly third-person exposition of the system.
  example_density: low                          # concrete, but the lever is glossing + real artifacts, not many examples.
  definition_density: { enum: just-in-time, per_1k: 4.9 }   # gloss each term inline on FIRST use — high rate (4.9/1k), the main density lever.
  code_density: none                            # show the real struct/number when it carries the point; no routine snippet ceremony.
  rhetorical_question_rate: none                # exposition states; it does not ask.

favor:
  connectives: [and, so, also, but, however, because]
  moves:
    - "front-load a findings index — each bullet a self-contained conclusion, not a contents list"
    - "two-phase system explanation: trace one concrete thing through the whole system, then tear down in dataflow order"
    - "anchor the new mechanism to the reader's known system, mapped part-for-part"
    - "show the real struct/number/code and walk it field by field"
    - "annotate the diff inline when the artifact changed (removed / added / renamed)"
    - "pair insecure and secure versions — flawed code, why it's wrong, then the fix"
    - "quantify with exact figure + unit + a date for anything that can go stale"
    - "compare options on a fixed set of measured axes, scored with numbers"
    - "gloss every term inline on first use"
    - "trace a worked example with a named actor and concrete values, state-change at each step"
    - "pair every capability with its limit or failure mode"
    - "make it reproducible — link the primary source and invite verification"

avoid:
  words: [delve, utilize, leverage, seamless, robust, "it's important to note",
          "in today's fast-paced world",
          "What is this article about?", "Actionable Insights", "Further Resources",
          "if you've read this far, anon", "(i.e.,"]
  connectives: ["Moreover,", "Furthermore,", "Additionally,", "In conclusion,"]

ai_tells:
  - { id: false-antithesis, cap_per_800w: 1 }
  - { id: em-dash-overuse, max: 4, kind: guardrail }   # NOT corpus-measured (every voice <2.2/1k); a safety ceiling, not a voice signal.
  - { id: uniform-cadence, min: 8 }            # even cadence is the #1 tell — keep the spread. (enforced on full lessons ≥250w)
  - { id: delve-class, cap: 0 }
  - { id: even-enthusiasm, rule: spike-then-cool }

notes:
  layer: >
    SECONDARY craft layer — structure & evidence. Idiolect is stripped: apply the MOVES (findings index,
    overview-then-teardown in dataflow order, real artifact walked field by field, inline glossing,
    capability-with-its-limit) in Kaue's voice, never as a Helius surface impersonation. Drop the ritual
    section labels, the "anon" closers, and the "(i.e., …)" tic — keep the practice of glossing.
  corpus: "Distilled from 93 pieces / ~357,974 words (Helius blog — Lostin + 0xIchigo). See evidence/helius.profile.json."
